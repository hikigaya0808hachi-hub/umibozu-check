<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BBQ会計</title>
<style>
*{box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:#fff7ec;
  margin:0;
  padding:14px;
  color:#332;
}
h1{text-align:center;margin:10px 0 14px}
.card{
  background:#fff;
  border-radius:18px;
  padding:14px;
  margin:12px 0;
  box-shadow:0 4px 14px #0002;
}
input{
  width:100%;
  font-size:18px;
  padding:14px;
  border-radius:12px;
  border:1px solid #ccc;
  margin:6px 0;
}
button{
  font-size:16px;
  padding:12px 14px;
  border-radius:12px;
  border:none;
  margin:4px 2px;
  font-weight:bold;
}
.add{background:#f08a24;color:white}
.pay{background:#20a35b;color:white}
.gray{background:#aaa;color:white}
.del{background:#d94b3d;color:white}
.quick{background:#333;color:white}
.stat{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}
.stat div{
  background:#fff;
  border-radius:15px;
  padding:12px;
  text-align:center;
  font-weight:bold;
  box-shadow:0 3px 10px #0001;
}
.totalAll{
  font-size:28px;
  color:#20a35b;
}
.row{display:flex;gap:6px}
.row input{flex:1}
.person.doneCard{opacity:.55}
.total{
  font-size:25px;
  font-weight:bold;
  margin:10px 0;
}
.history{
  line-height:2.3;
  font-size:17px;
}
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:#0009;
  align-items:center;
  justify-content:center;
  padding:18px;
  z-index:999;
}
.modalBox{
  background:#fff;
  border-radius:22px;
  padding:24px;
  max-width:430px;
  width:100%;
  text-align:center;
}
.bigTotal{
  font-size:48px;
  font-weight:900;
  color:#20a35b;
}
.small{font-size:13px;color:#777}
</style>
</head>
<body>

<h1>🍖 BBQ会計</h1>

<div class="stat">
  <div>未会計<br><span id="unpaidCount">0</span>人</div>
  <div>会計済<br><span id="paidCount">0</span>人</div>
</div>

<div class="card" style="text-align:center">
  <div>本日の追加売上</div>
  <div class="totalAll" id="allTotal">￥0</div>
</div>

<div class="card">
  <input id="nameInput" placeholder="名前・席番号 例：山田 / 席3">
  <button class="add" onclick="addPerson()">お客さん追加</button>
</div>

<div class="card">
  <input id="searchInput" placeholder="🔍 名前検索" oninput="render()">
</div>

<div id="list"></div>

<div class="modal" id="modal">
  <div class="modalBox">
    <h2 id="modalName"></h2>
    <div id="modalItems"></div>
    <hr>
    <div class="bigTotal" id="modalTotal"></div>
    <button class="pay" onclick="markPaid()">会計済みにする</button>
    <button class="gray" onclick="closeModal()">閉じる</button>
  </div>
</div>

<script>
let people = JSON.parse(localStorage.getItem("bbqPeopleV2") || "[]");
let currentPayId = null;

function save(){
  localStorage.setItem("bbqPeopleV2", JSON.stringify(people));
}

function yen(n){
  return "￥" + Number(n).toLocaleString();
}

function addPerson(){
  const name = document.getElementById("nameInput").value.trim();
  if(!name) return alert("名前を入れてね！");
  people.push({
    id:Date.now(),
    name:name,
    items:[],
    paid:false
  });
  document.getElementById("nameInput").value="";
  save();
  render();
}

function total(p){
  return p.items.reduce((a,b)=>a+b,0);
}

function addItem(id, amount=null){
  const p = people.find(x=>x.id===id);
  if(p.paid){
    if(!confirm("会計済みだけど追加する？")) return;
  }

  if(amount === null){
    const input = document.getElementById("amount_"+id);
    amount = Number(input.value);
    if(!amount || amount <= 0) return alert("金額を入れてね！");
    input.value="";
  }

  p.items.push(Number(amount));
  save();
  render();
}

function deleteItem(id,index){
  if(!confirm("この金額を消す？")) return;
  const p = people.find(x=>x.id===id);
  p.items.splice(index,1);
  save();
  render();
}

function openPay(id){
  currentPayId = id;
  const p = people.find(x=>x.id===id);

  document.getElementById("modalName").textContent = "👤 " + p.name;

  document.getElementById("modalItems").innerHTML =
    p.items.length
    ? p.items.map(x=>"・"+yen(x)).join("<br>")
    : "追加注文なし";

  document.getElementById("modalTotal").textContent = yen(total(p));
  document.getElementById("modal").style.display="flex";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

function markPaid(){
  const p = people.find(x=>x.id===currentPayId);
  p.paid = true;
  save();
  closeModal();
  render();
}

function togglePaid(id){
  const p = people.find(x=>x.id===id);
  p.paid = !p.paid;
  save();
  render();
}

function removePerson(id){
  if(!confirm("この人を削除する？")) return;
  people = people.filter(x=>x.id!==id);
  save();
  render();
}

function resetAll(){
  if(confirm("全部リセットする？戻せないよ！")){
    people = [];
    save();
    render();
  }
}

function render(){
  const keyword = document.getElementById("searchInput").value.trim();
  const list = document.getElementById("list");

  const unpaid = people.filter(p=>!p.paid).length;
  const paid = people.filter(p=>p.paid).length;
  const allTotal = people.reduce((sum,p)=>sum+total(p),0);

  document.getElementById("unpaidCount").textContent = unpaid;
  document.getElementById("paidCount").textContent = paid;
  document.getElementById("allTotal").textContent = yen(allTotal);

  const sorted = [...people]
    .filter(p=>p.name.includes(keyword))
    .sort((a,b)=>a.paid-b.paid);

  list.innerHTML = sorted.map(p=>`
    <div class="card person ${p.paid?'doneCard':''}">
      <h2>${p.paid?'✅ ':''}${p.name}</h2>

      <div class="row">
        <input id="amount_${p.id}" type="number" placeholder="金額入力 例：500">
        <button class="add" onclick="addItem(${p.id})">追加</button>
      </div>

      <div>
        <button class="quick" onclick="addItem(${p.id},300)">＋300</button>
        <button class="quick" onclick="addItem(${p.id},500)">＋500</button>
        <button class="quick" onclick="addItem(${p.id},600)">＋600</button>
        <button class="quick" onclick="addItem(${p.id},700)">＋700</button>
        <button class="quick" onclick="addItem(${p.id},800)">＋800</button>
        <button class="quick" onclick="addItem(${p.id},1000)">＋1000</button>
      </div>

      <div class="history">
        ${p.items.map((x,i)=>`
          ${yen(x)}
          <button class="del" onclick="deleteItem(${p.id},${i})">×</button><br>
        `).join("")}
      </div>

      <div class="total">合計：${yen(total(p))}</div>

      <button class="pay" onclick="openPay(${p.id})">💰 会計</button>
      <button class="gray" onclick="togglePaid(${p.id})">${p.paid?'未会計に戻す':'会計済み'}</button>
      <button class="del" onclick="removePerson(${p.id})">削除</button>
    </div>
  `).join("");

  list.innerHTML += `
    <div class="card">
      <button class="del" onclick="resetAll()">全リセット</button>
      <div class="small">※データはこの端末のブラウザに保存されます</div>
    </div>
  `;
}

render();
</script>

</body>
</html>
