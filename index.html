<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BBQ会計</title>
<style>
body{font-family:Arial,sans-serif;background:#f7f3ed;margin:0;padding:15px;color:#333}
h1{text-align:center}
.card{background:white;border-radius:16px;padding:15px;margin:12px 0;box-shadow:0 3px 10px #0002}
input,button{font-size:16px;padding:12px;border-radius:10px;border:1px solid #ccc}
input{width:100%;box-sizing:border-box;margin:6px 0}
button{border:none;background:#333;color:white;margin:4px 2px}
.add{background:#e67e22}
.pay{background:#27ae60}
.done{background:#aaa}
.delete{background:#c0392b;padding:6px 10px}
.person.doneCard{opacity:.55}
.total{font-size:24px;font-weight:bold;margin-top:10px}
.history{margin:8px 0}
.row{display:flex;gap:6px}
.row input{flex:1}
.modal{display:none;position:fixed;inset:0;background:#0008;align-items:center;justify-content:center;padding:20px}
.modalBox{background:white;border-radius:20px;padding:25px;max-width:420px;width:100%;text-align:center}
.bigTotal{font-size:42px;font-weight:bold;color:#27ae60}
</style>
</head>
<body>

<h1>🍖 BBQ会計</h1>

<div class="card">
  <input id="nameInput" placeholder="名前・席番号を入力">
  <button class="add" onclick="addPerson()">お客さん追加</button>
</div>

<div class="card">
  <input id="searchInput" placeholder="名前検索" oninput="render()">
</div>

<div id="list"></div>

<div class="modal" id="modal">
  <div class="modalBox">
    <h2 id="modalName"></h2>
    <div id="modalItems"></div>
    <p class="bigTotal" id="modalTotal"></p>
    <button class="pay" onclick="markPaid()">会計済みにする</button>
    <button onclick="closeModal()">閉じる</button>
  </div>
</div>

<script>
let people = JSON.parse(localStorage.getItem("bbqPeople") || "[]");
let currentPayId = null;

function save(){
  localStorage.setItem("bbqPeople", JSON.stringify(people));
}

function addPerson(){
  const name = document.getElementById("nameInput").value.trim();
  if(!name) return alert("名前を入れてね！");
  people.push({id:Date.now(), name, items:[], paid:false});
  document.getElementById("nameInput").value="";
  save(); render();
}

function addItem(id){
  const input = document.getElementById("amount_"+id);
  const amount = Number(input.value);
  if(!amount || amount <= 0) return alert("金額を入れてね！");
  const p = people.find(x=>x.id===id);
  p.items.push(amount);
  input.value="";
  save(); render();
}

function deleteItem(id,index){
  const p = people.find(x=>x.id===id);
  p.items.splice(index,1);
  save(); render();
}

function total(p){
  return p.items.reduce((a,b)=>a+b,0);
}

function openPay(id){
  currentPayId = id;
  const p = people.find(x=>x.id===id);
  document.getElementById("modalName").textContent = "👤 " + p.name;
  document.getElementById("modalItems").innerHTML =
    p.items.length ? p.items.map(x=>"・"+x.toLocaleString()+"円").join("<br>") : "追加注文なし";
  document.getElementById("modalTotal").textContent = "￥" + total(p).toLocaleString();
  document.getElementById("modal").style.display="flex";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

function markPaid(){
  const p = people.find(x=>x.id===currentPayId);
  p.paid = true;
  save(); closeModal(); render();
}

function togglePaid(id){
  const p = people.find(x=>x.id===id);
  p.paid = !p.paid;
  save(); render();
}

function removePerson(id){
  if(!confirm("この人を削除する？")) return;
  people = people.filter(x=>x.id!==id);
  save(); render();
}

function resetAll(){
  if(confirm("全部リセットする？")) {
    people = [];
    save(); render();
  }
}

function render(){
  const keyword = document.getElementById("searchInput").value.trim();
  const list = document.getElementById("list");
  const sorted = [...people]
    .filter(p=>p.name.includes(keyword))
    .sort((a,b)=>a.paid-b.paid);

  list.innerHTML = sorted.map(p=>`
    <div class="card person ${p.paid?'doneCard':''}">
      <h2>${p.paid?'✅ ':''}${p.name}</h2>

      <div class="row">
        <input id="amount_${p.id}" type="number" placeholder="金額入力 例：500">
        <button class="add" onclick="addItem(${p.id})">追加</button>
      </div>

      <div class="history">
        ${p.items.map((x,i)=>`
          ${x.toLocaleString()}円
          <button class="delete" onclick="deleteItem(${p.id},${i})">×</button><br>
        `).join("")}
      </div>

      <div class="total">合計：${total(p).toLocaleString()}円</div>

      <button class="pay" onclick="openPay(${p.id})">会計</button>
      <button class="done" onclick="togglePaid(${p.id})">${p.paid?'未会計に戻す':'会計済み'}</button>
      <button class="delete" onclick="removePerson(${p.id})">削除</button>
    </div>
  `).join("");

  list.innerHTML += `<button class="delete" onclick="resetAll()">全リセット</button>`;
}

render();
</script>

</body>
</html>
